<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大腦動一動 - 記憶對對碰</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #F5F5DC; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; user-select: none; -webkit-user-select: none; }
        h1 { color: #333; font-size: 24px; margin: 10px 0 5px 0; }
        .top-bar { display: flex; justify-content: space-between; width: 100%; max-width: 480px; align-items: center; margin-bottom: 10px; }
        .back-btn { font-size: 16px; font-weight: bold; padding: 8px 15px; background-color: #777; color: white; border: none; border-radius: 8px; text-decoration: none; }
        .difficulty-container { display: flex; gap: 8px; width: 100%; max-width: 480px; margin-bottom: 10px; }
        .diff-btn { flex: 1; font-size: 16px; font-weight: bold; padding: 10px 0; border: 2px solid #333; border-radius: 8px; cursor: pointer; background-color: #FFF; }
        .diff-btn.active { background-color: #4CAF50; color: white; }
        .score-board { font-size: 18px; font-weight: bold; color: #555; margin-bottom: 10px; }
        .game-container { display: grid; gap: 12px; width: 100%; max-width: 480px; padding: 5px; box-sizing: border-box; }
        .card { aspect-ratio: 1 / 1; background-color: #4682B4; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 42px; box-shadow: 0 5px 6px rgba(0,0,0,0.15); position: relative; }
        .card::before { content: "？"; color: white; font-size: 36px; font-weight: bold; position: absolute; }
        .card.flipped { background-color: #FFFFFF; border: 3px solid #333; }
        .card.flipped::before { display: none; }
        .card.matched { background-color: #E0E0E0; border: 3px solid #999; box-shadow: none; color: #999; }
        .card.matched::before { display: none; }
        .win-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 10; }
        .win-box { background-color: white; padding: 25px; border-radius: 20px; text-align: center; max-width: 80%; }
        .btn { font-size: 22px; padding: 12px 35px; background-color: #FF5722; color: white; border: none; border-radius: 10px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="index.html" class="back-btn">⬅️ 回大廳</a>
        <h1>🧩 記憶對對碰</h1>
        <div style="width:75px;"></div> <!-- 排版平衡用 -->
    </div>
    <div class="difficulty-container">
        <button class="diff-btn" id="btn-easy" onclick="changeDifficulty('easy')">簡單</button>
        <button class="diff-btn active" id="btn-normal" onclick="changeDifficulty('normal')">普通</button>
        <button class="diff-btn" id="btn-hard" onclick="changeDifficulty('hard')">困難</button>
    </div>
    <div class="score-board" id="scoreBoard">翻牌次數：0 次 | 已成功：0 / 6</div>
    <div class="game-container" id="gameContainer"></div>
   <div class="win-overlay" id="winOverlay">
    <div class="win-box">
        <h2 style="font-size: 30px; color: #9C27B0;">🌸 太棒了！🌸</h2>
        <p style="font-size: 22px; color: #333; margin-bottom: 25px;">成功翻開所有卡片！大腦記憶力大成功！</p>

        <div style="display: flex; gap: 15px; justify-content: center; width: 100%;">
            <button class="btn" style="background-color: #4CAF50; flex: 1; font-size: 22px; font-weight: bold; padding: 15px 0; border: none; border-radius: 12px; color: white;" onclick="resetGame()">🟢 再玩一次</button>
            <a href="index.html" class="btn" style="background-color: #F44336; flex: 1; font-size: 22px; font-weight: bold; padding: 15px 0; border: none; border-radius: 12px; color: white; text-decoration: none; display: inline-block; line-height: 26px; text-align: center;">🔴 回大廳</a>
        </div>
    </div>
</div>
    <script>
        const ALL_ITEMS = ["🍎", "🍉", "🍌", "☎️", "🫖", "🍚", "🚂", "🚗", "🌻", "⛰️"];
        const DIFF_CONFIG = { easy: { pairs: 3, cols: 2 }, normal: { pairs: 6, cols: 3 }, hard: { pairs: 10, cols: 4 } };
        let currentDifficulty = 'normal', cardsData = [], selectedCards = [], clicks = 0, matches = 0, isWaiting = false;
        const gameContainer = document.getElementById('gameContainer'), scoreBoard = document.getElementById('scoreBoard'), winOverlay = document.getElementById('winOverlay');
        function changeDifficulty(level) { if (isWaiting) return; document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.remove('active')); document.getElementById(`btn-${level}`).classList.add('active'); currentDifficulty = level; initGame(); }
        function initGame() {
            const config = DIFF_CONFIG[currentDifficulty];
            gameContainer.style.gridTemplateColumns = `repeat(${config.cols}, 1fr)`;
            let activeItems = ALL_ITEMS.slice(0, config.pairs);
            let list = [...activeItems, ...activeItems];
            list.sort(() => Math.random() - 0.5);
            cardsData = list.map((value, index) => ({ id: index, value: value, isFlipped: false, isMatched: false }));
            gameContainer.innerHTML = '';
            cardsData.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('card');
                cardElement.dataset.id = card.id;
                cardElement.addEventListener('click', () => handleCardClick(card.id, cardElement));
                gameContainer.appendChild(cardElement);
            });
            clicks = 0; matches = 0; updateScore();
        }
        function handleCardClick(id, element) {
            if (isWaiting || cardsData[id].isFlipped || cardsData[id].isMatched) return;
            cardsData[id].isFlipped = true; element.classList.add('flipped'); element.textContent = cardsData[id].value; selectedCards.push({ id, element });
            if (selectedCards.length === 2) { clicks++; updateScore(); checkMatch(); }
        }
function checkMatch() {
            const [card1, card2] = selectedCards; 
            const config = DIFF_CONFIG[currentDifficulty];
            
            // 當兩張牌的圖案/數字一模一樣時（配對成功）
            if (cardsData[card1.id].value === cardsData[card2.id].value) {
                cardsData[card1.id].isMatched = true; 
                cardsData[card2.id].isMatched = true; 
                card1.element.classList.add('matched'); 
                card2.element.classList.add('matched'); 
                selectedCards = []; 
                matches++; 
                updateScore();
                playCorrectSound(); 
                
                if (matches === config.pairs) { 
                    setTimeout(() => { winOverlay.style.display = 'flex'; }, 500); 
                }
            } else {
                isWaiting = true;
                setTimeout(() => {
                    cardsData[card1.id].isFlipped = false; cardsData[card2.id].isFlipped = false; card1.element.classList.remove('flipped'); card2.element.classList.remove('flipped'); card1.element.textContent = ''; card2.element.textContent = ''; selectedCards = []; isWaiting = false;
                }, 1200);
            }
        }
        function updateScore() { const config = DIFF_CONFIG[currentDifficulty]; scoreBoard.textContent = `翻牌次數：${clicks} 次 | 已成功：${matches} / ${config.pairs}`; }
        function resetGame() { winOverlay.style.display = 'none'; initGame(); }
        initGame();
// ==========================================
// 🕒 遊戲中同步累積時間功能
// ==========================================
setInterval(() => {
    let currentSeconds = parseInt(localStorage.getItem('game_total_seconds') || '0', 10);
    currentSeconds++;
    localStorage.setItem('game_total_seconds', currentSeconds.toString());
}, 1000);

        // 🔔 答對時的清脆叮咚音效
function playCorrectSound() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();

    // 第一聲：「叮」（音高 523Hz，持續 0.1 秒）
    let osc1 = ctx.createOscillator();
    let gain1 = ctx.createGain();
    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(523.25, ctx.currentTime); // C5 音符
    gain1.gain.setValueAtTime(0.2, ctx.currentTime);
    gain1.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
    osc1.connect(gain1);
    gain1.connect(ctx.destination);
    osc1.start();
    osc1.stop(ctx.currentTime + 0.1);

    // 第二聲：「咚」（音高 659Hz，稍微延遲 0.08 秒後發聲，持續 0.25 秒）
    setTimeout(() => {
        let osc2 = ctx.createOscillator();
        let gain2 = ctx.createGain();
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(659.25, ctx.currentTime); // E5 音符
        gain2.gain.setValueAtTime(0.2, ctx.currentTime);
        gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
        osc2.connect(gain2);
        gain2.connect(ctx.destination);
        osc2.start();
        osc2.stop(ctx.currentTime + 0.25);
    }, 80);
}
    </script>
</body>
</html>
