<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大腦動一動 - 買菜算錢大考驗</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #F5F5DC; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; }
        .top-bar { display: flex; justify-content: space-between; width: 100%; max-width: 480px; align-items: center; margin-bottom: 20px; }
        .back-btn { font-size: 16px; font-weight: bold; padding: 8px 15px; background-color: #777; color: white; border: none; border-radius: 8px; text-decoration: none; }
        h1 { color: #333; font-size: 24px; margin: 0; }
        .quiz-container { background-color: white; width: 100%; max-width: 450px; border: 3px solid #333; border-radius: 20px; padding: 25px; box-sizing: border-box; text-align: center; box-shadow: 0 6px 10px rgba(0,0,0,0.1); }
        .question { font-size: 26px; font-weight: bold; color: #333; margin: 15px 0; line-height: 1.5; }
        .item-display { font-size: 60px; margin: 10px 0; }
        .options-container { display: flex; flex-direction: column; gap: 15px; margin-top: 25px; }
        .option-btn { font-size: 24px; font-weight: bold; padding: 15px; border: 3px solid #333; border-radius: 12px; background-color: #FFF; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .option-btn:active { transform: scale(0.97); }
        .status-board { font-size: 18px; font-weight: bold; color: #555; margin-top: 15px; }
        .feedback { font-size: 24px; font-weight: bold; margin-top: 10px; height: 30px; }
        .win-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 10; }
        .win-box { background-color: white; padding: 25px; border-radius: 20px; text-align: center; max-width: 80%; }
        .btn { font-size: 22px; padding: 12px 35px; background-color: #FF5722; color: white; border: none; border-radius: 10px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="back-btn">⬅️ 回大廳</a>
        <h1>🛒 買菜算錢考驗</h1>
        <div style="width:75px;"></div>
    </div>

    <div class="quiz-container">
        <div class="status-board" id="progress">第 1 / 3 題</div>
        <div class="item-display" id="itemEmoji">🥚</div>
        <div class="question" id="questionText">載入中...</div>
        
        <div class="options-container" id="options">
            <!-- 按鈕由 JS 動態產生 -->
        </div>
        <div class="feedback" id="feedbackText"></div>
    </div>

    <div class="win-overlay" id="winOverlay">
        <div class="win-box">
            <h2 style="font-size: 32px; color: #228B22; margin: 0;">🎉 太厲害了！</h2>
            <p style="font-size: 22px; color: #333;">帳目算得一清二楚！<br>大腦非常有活力喔！</p>
            <button class="btn" onclick="resetGame()">再挑戰一次</button>
        </div>
    </div>

    <script>
        // 題庫設計：長者熟悉的古早味與日常用品
        const PRODUCTS = [
            { name: "茶葉蛋", price: 15, emoji: "🥚" },
            { name: "紅豆餅", price: 20, emoji: "🪙" },
            { name: "香蕉", price: 10, emoji: "🍌" },
            { name: "古早味麵包", price: 30, emoji: "🍞" },
            { name: "熱開水/老人茶", price: 5, emoji: "🍵" },
            { name: "營養軟糖", price: 50, emoji: "🍬" }
        ];

        let currentQuestion = 1;
        const totalQuestions = 3;
        let correctAnswer = 0;
        let canClick = true;

        function generateQuestion() {
            canClick = true;
            document.getElementById('feedbackText').textContent = "";
            document.getElementById('progress').textContent = `第 ${currentQuestion} / ${totalQuestions} 題`;

            // 隨機選一個商品與數量
            const prod = PRODUCTS[Math.floor(Math.random() * PRODUCTS.length)];
            const quantity = Math.floor(Math.random() * 4) + 2; // 2 ~ 5 包/個
            correctAnswer = prod.price * quantity;

            document.getElementById('itemEmoji').textContent = prod.emoji;
            document.getElementById('questionText').innerHTML = `${prod.name}一組 <b>${prod.price}</b> 元，<br>今天買了 <b>${quantity}</b> 組，請問一共要付多少錢？`;

            // 產生干擾選項 (錯誤答案)
            let wrong1 = correctAnswer + prod.price;
            let wrong2 = correctAnswer - prod.price > 0 ? correctAnswer - prod.price : correctAnswer + (prod.price * 2);
            
            // 隨機打亂答案順序
            let options = [correctAnswer, wrong1, wrong2];
            options.sort(() => Math.random() - 0.5);

            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.classList.add('option-btn');
                btn.textContent = `${opt} 元`;
                btn.onclick = () => checkAnswer(opt, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selected, buttonElement) {
            if (!canClick) return;
            canClick = false;

            const feedback = document.getElementById('feedbackText');
            if (selected === correctAnswer) {
                feedback.style.color = "#228B22";
                feedback.textContent = "⭕ 答對了！真聰明！";
                buttonElement.style.backgroundColor = "#C8E6C9";
                
                setTimeout(() => {
                    if (currentQuestion < totalQuestions) {
                        currentQuestion++;
                        generateQuestion();
                    } else {
                        document.getElementById('winOverlay').style.display = 'flex';
                    }
                }, 1500);
            } else {
                feedback.style.color = "#D32F2F";
                feedback.textContent = "❌ 算錯囉，再想一下！";
                buttonElement.style.backgroundColor = "#FFCDD2";
                // 答錯了允許重新點選
                setTimeout(() => {
                    buttonElement.style.backgroundColor = "#FFF";
                    feedback.textContent = "";
                    canClick = true;
                }, 1200);
            }
        }

        function resetGame() {
            document.getElementById('winOverlay').style.display = 'none';
            currentQuestion = 1;
            generateQuestion();
        }

        // 啟動第一題
        generateQuestion();
// ==========================================
// 🕒 遊戲中同步累積時間功能
// ==========================================
setInterval(() => {
    let currentSeconds = parseInt(localStorage.getItem('game_total_seconds') || '0', 10);
    currentSeconds++;
    localStorage.setItem('game_total_seconds', currentSeconds.toString());
}, 1000);
    </script>
</body>
</html>
