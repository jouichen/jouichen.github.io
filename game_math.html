<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大腦動一動 - 買菜算錢大考驗</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #F5F5DC; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; user-select: none; -webkit-user-select: none; }
        .top-bar { display: flex; justify-content: space-between; width: 100%; max-width: 450px; align-items: center; margin-bottom: 10px; }
        .back-btn { font-size: 16px; font-weight: bold; padding: 8px 15px; background-color: #777; color: white; border: none; border-radius: 8px; text-decoration: none; }
        h1 { color: #333; font-size: 24px; margin: 0; }
        
        /* 等級切換按鈕區 */
        .difficulty-container { display: flex; gap: 8px; width: 100%; max-width: 450px; margin-bottom: 15px; }
        .diff-btn { flex: 1; font-size: 16px; font-weight: bold; padding: 10px 0; border: 2px solid #333; border-radius: 8px; cursor: pointer; background-color: #FFF; }
        .diff-btn.active { background-color: #4CAF50; color: white; }

        .quiz-container { background-color: white; width: 100%; max-width: 450px; border: 3px solid #333; border-radius: 20px; padding: 20px; box-sizing: border-box; text-align: center; box-shadow: 0 6px 10px rgba(0,0,0,0.1); }
        .question { font-size: 24px; font-weight: bold; color: #333; margin: 15px 0; line-height: 1.6; }
        .item-display { font-size: 60px; margin: 10px 0; letter-spacing: 5px; }
        .options-container { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .option-btn { font-size: 24px; font-weight: bold; padding: 15px; border: 3px solid #333; border-radius: 12px; background-color: #FFF; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .option-btn:active { transform: scale(0.97); }
        .status-board { font-size: 18px; font-weight: bold; color: #555; margin-top: 5px; }
        .feedback { font-size: 24px; font-weight: bold; margin-top: 10px; height: 30px; }
        
        .win-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 10; }
        .win-box { background-color: white; padding: 25px; border-radius: 20px; text-align: center; max-width: 80%; }
        .btn { font-size: 22px; padding: 12px 35px; background-color: #FF5722; color: white; border: none; border-radius: 10px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="back-btn">⬅️ 回大廳</a>
        <h1>🛒 買菜算錢考驗</h1>
        <div style="width:75px;"></div>
    </div>

    <!-- 難易度按鈕 -->
    <div class="difficulty-container">
        <button class="diff-btn" id="btn-easy" onclick="changeDifficulty('easy')">簡單</button>
        <button class="diff-btn active" id="btn-normal" onclick="changeDifficulty('normal')">普通</button>
        <button class="diff-btn" id="btn-hard" onclick="changeDifficulty('hard')">困難 (挑戰)</button>
    </div>

    <div class="quiz-container">
        <div class="status-board" id="progress">第 1 / 3 題</div>
        <div class="item-display" id="itemEmoji">🥚</div>
        <div class="question" id="questionText">載入中...</div>
        
        <div class="options-container" id="options"></div>
        <div class="feedback" id="feedbackText"></div>
    </div>

    <div class="win-overlay" id="winOverlay">
    <div class="win-box">
        <h2 style="font-size: 30px; color: #4CAF50;">🟢 恭喜過關！</h2>
        <p style="font-size: 22px; color: #333; margin-bottom: 25px;">算術精準！獲得大紅花印章 💮</p>

        <div style="display: flex; gap: 15px; justify-content: center; width: 100%;">
            <button class="btn" style="background-color: #4CAF50; flex: 1; font-size: 22px; font-weight: bold; padding: 15px 0; border: none; border-radius: 12px; color: white;" onclick="resetGame()">🟢 再挑戰一次</button>
            <a href="index.html" class="btn" style="background-color: #F44336; flex: 1; font-size: 22px; font-weight: bold; padding: 15px 0; border: none; border-radius: 12px; color: white; text-decoration: none; display: inline-block; line-height: 26px; text-align: center;">🔴 回大廳</a>
        </div>
    </div>
</div>
        </div>
    </div>

    <script>
        // 分門別類的日常題庫
        const ITEMS_EASY = [
            { name: "茶葉蛋", price: 15, emoji: "🥚" },
            { name: "紅豆餅", price: 20, emoji: "🪙" },
            { name: "香蕉", price: 10, emoji: "🍌" },
            { name: "老人茶", price: 5, emoji: "🍵" }
        ];

        const ITEMS_NORMAL = [
            { name: "古早味麵包", price: 30, emoji: "🍞" },
            { name: "營養軟糖", price: 50, emoji: "🍬" },
            { name: "愛心便當", price: 80, emoji: "🍱" }
        ];

        let currentQuestion = 1;
        const totalQuestions = 3;
        let correctAnswer = 0;
        let canClick = true;
        let currentLevel = 'normal';

        function changeDifficulty(level) {
            document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${level}`).classList.add('active');
            currentLevel = level;
            resetGame();
        }

        function generateQuestion() {
            canClick = true;
            document.getElementById('feedbackText').textContent = "";
            document.getElementById('progress').textContent = `第 ${currentQuestion} / ${totalQuestions} 題`;

            let emojiText = "";
            let questionText = "";

            if (currentLevel === 'easy' || currentLevel === 'normal') {
                // 簡單、普通模式：買單一商品
                const pool = (currentLevel === 'easy') ? ITEMS_EASY : ITEMS_NORMAL;
                const prod = pool[Math.floor(Math.random() * pool.length)];
                const quantity = Math.floor(Math.random() * 3) + 2; // 2 ~ 4 個
                correctAnswer = prod.price * quantity;

                emojiText = prod.emoji.repeat(quantity > 4 ? 4 : quantity); // 避免太多圖標擠爆
                questionText = `${prod.name}一組 <b>${prod.price}</b> 元，<br>今天買了 <b>${quantity}</b> 組，請問一共要付多少錢？`;

            } else if (currentLevel === 'hard') {
                // 困難模式：兩種商品混合計算 (複合加乘法)
                const prod1 = ITEMS_EASY[Math.floor(Math.random() * ITEMS_EASY.length)];
                let prod2;
                do {
                    prod2 = ITEMS_EASY[Math.floor(Math.random() * ITEMS_EASY.length)];
                } while (prod1.name === prod2.name);

                const qty1 = Math.floor(Math.random() * 2) + 1; // 1 ~ 2 個
                const qty2 = Math.floor(Math.random() * 2) + 1; // 1 ~ 2 個
                correctAnswer = (prod1.price * qty1) + (prod2.price * qty2);

                emojiText = `${prod1.emoji.repeat(qty1)} + ${prod2.emoji.repeat(qty2)}`;
                questionText = `今天去市場：<br>買了 ${qty1} 個 ${prod1.name} (每個 <b>${prod1.price}</b> 元)<br>和 ${qty2} 個 ${prod2.name} (每個 <b>${prod2.price}</b> 元)，<br>結帳總共要付多少錢？`;
            }

            document.getElementById('itemEmoji').innerHTML = emojiText;
            document.getElementById('questionText').innerHTML = questionText;

            // 產生干擾選項
            let wrong1 = correctAnswer + 10;
            let wrong2 = correctAnswer - 10 > 0 ? correctAnswer - 10 : correctAnswer + 20;
            
            // 隨機打亂答案順序
            let options = [correctAnswer, wrong1, wrong2];
            options.sort(() => Math.random() - 0.5);

            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.classList.add('option-btn');
                btn.textContent = `${opt} 元`;
                btn.onclick = () => checkAnswer(opt, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selected, buttonElement) {
            if (!canClick) return;
            canClick = false;

            const feedback = document.getElementById('feedbackText');
            if (selected === correctAnswer) {
                feedback.style.color = "#228B22";
                feedback.textContent = "⭕ 答對了！心算真快！";
                buttonElement.style.backgroundColor = "#C8E6C9";
                playCorrectSound(); // 答對立刻叮咚
                setTimeout(() => {
                    if (currentQuestion < totalQuestions) {
                        currentQuestion++;
                        generateQuestion();
                    } else {
                        document.getElementById('winOverlay').style.display = 'flex';
                    }
                }, 1500);
            } else {
                feedback.style.color = "#D32F2F";
                feedback.textContent = "❌ 算錯囉，再撥個算盤想想！";
                buttonElement.style.backgroundColor = "#FFCDD2";
                setTimeout(() => {
                    buttonElement.style.backgroundColor = "#FFF";
                    feedback.textContent = "";
                    canClick = true;
                }, 1200);
            }
        }

        function resetGame() {
            document.getElementById('winOverlay').style.display = 'none';
            currentQuestion = 1;
            generateQuestion();
        }

        generateQuestion();

        // 🕒 遊戲中同步累積時間
        setInterval(() => {
            let currentSeconds = parseInt(localStorage.getItem('game_total_seconds') || '0', 10);
            currentSeconds++;
            localStorage.setItem('game_total_seconds', currentSeconds.toString());
        }, 1000);
        
   // 🔔 答對時的清脆叮咚音效
function playCorrectSound() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();

    // 第一聲：「叮」（音高 523Hz，持續 0.1 秒）
    let osc1 = ctx.createOscillator();
    let gain1 = ctx.createGain();
    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(523.25, ctx.currentTime); // C5 音符
    gain1.gain.setValueAtTime(0.2, ctx.currentTime);
    gain1.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
    osc1.connect(gain1);
    gain1.connect(ctx.destination);
    osc1.start();
    osc1.stop(ctx.currentTime + 0.1);

    // 第二聲：「咚」（音高 659Hz，稍微延遲 0.08 秒後發聲，持續 0.25 秒）
    setTimeout(() => {
        let osc2 = ctx.createOscillator();
        let gain2 = ctx.createGain();
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(659.25, ctx.currentTime); // E5 音符
        gain2.gain.setValueAtTime(0.2, ctx.currentTime);
        gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
        osc2.connect(gain2);
        gain2.connect(ctx.destination);
        osc2.start();
        osc2.stop(ctx.currentTime + 0.25);
    }, 80);
}
    
    </script>
</body>
</html>
