<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大腦動一動 - 看看時鐘幾點鐘</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #F5F5DC; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; user-select: none; -webkit-user-select: none; }
        .top-bar { display: flex; justify-content: space-between; width: 100%; max-width: 450px; align-items: center; margin-bottom: 10px; }
        .back-btn { font-size: 16px; font-weight: bold; padding: 8px 15px; background-color: #777; color: white; border: none; border-radius: 8px; text-decoration: none; }
        h1 { color: #333; font-size: 24px; margin: 0; }
        
        /* 等級切換按鈕區 */
        .difficulty-container { display: flex; gap: 8px; width: 100%; max-width: 450px; margin-bottom: 15px; }
        .diff-btn { flex: 1; font-size: 16px; font-weight: bold; padding: 10px 0; border: 2px solid #333; border-radius: 8px; cursor: pointer; background-color: #FFF; }
        .diff-btn.active { background-color: #4CAF50; color: white; }

        .quiz-container { background-color: white; width: 100%; max-width: 450px; border: 3px solid #333; border-radius: 20px; padding: 20px; box-sizing: border-box; text-align: center; box-shadow: 0 6px 10px rgba(0,0,0,0.1); }
        .status-board { font-size: 18px; font-weight: bold; color: #555; margin-top: 5px; }
        .question { font-size: 22px; font-weight: bold; color: #333; margin: 15px 0; line-height: 1.4; }
        
        /* 🕒 CSS 復古大時鐘繪製 */
        .clock-wrapper { display: flex; justify-content: center; margin: 20px 0; }
        .clock { width: 200px; height: 200px; border: 8px solid #8B4513; border-radius: 50%; background-color: #FFF; position: relative; box-shadow: inset 0 0 20px rgba(0,0,0,0.1), 0 4px 8px rgba(0,0,0,0.2); }
        .clock-center { width: 12px; height: 12px; background-color: #000; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; }
        
        /* 時鐘數字定位 */
        .number { position: absolute; font-size: 20px; font-weight: bold; color: #333; width: 30px; height: 30px; text-align: center; line-height: 30px; }
        .n12 { top: 5px; left: 85px; }
        .n3 { top: 85px; right: 5px; }
        .n6 { bottom: 5px; left: 85px; }
        .n9 { top: 85px; left: 5px; }

        /* 指針 */
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom center; border-radius: 4px; background-color: #000; }
        .hour-hand { width: 6px; height: 50px; z-index: 2; }
        .minute-hand { width: 4px; height: 75px; background-color: #555; z-index: 3; }

        /* 選項區 */
        .options-container { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .option-btn { font-size: 24px; font-weight: bold; padding: 15px; border: 3px solid #333; border-radius: 12px; background-color: #FFF; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .option-btn:active { transform: scale(0.97); }
        .feedback { font-size: 24px; font-weight: bold; margin-top: 10px; height: 30px; }
        
        /* 結算彈出視窗 */
        .win-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 10; }
        .win-box { background-color: white; padding: 25px; border-radius: 20px; text-align: center; max-width: 80%; }
        .btn { font-size: 22px; font-weight: bold; padding: 15px 0; color: white; border: none; border-radius: 12px; cursor: pointer; text-align: center; box-shadow: 0 4px rgba(0,0,0,0.2); box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="back-btn">⬅️ 回大廳</a>
        <h1>🕒 看時鐘猜時間</h1>
        <div style="width:75px;"></div>
    </div>

    <div class="difficulty-container">
        <button class="diff-btn" id="btn-easy" onclick="changeDifficulty('easy')">簡單</button>
        <button class="diff-btn active" id="btn-normal" onclick="changeDifficulty('normal')">普通</button>
        <button class="diff-btn" id="btn-hard" onclick="changeDifficulty('hard')">困難 (挑戰)</button>
    </div>

    <div class="quiz-container">
        <div class="status-board" id="progress">第 1 / 3 題</div>
        
        <div class="clock-wrapper">
            <div class="clock">
                <div class="clock-center"></div>
                <div class="number n12">12</div>
                <div class="number n3">3</div>
                <div class="number n6">6</div>
                <div class="number n9">9</div>
                <div class="hand hour-hand" id="hourHand"></div>
                <div class="hand minute-hand" id="minuteHand"></div>
            </div>
        </div>

        <div class="question">請問現在時鐘上顯示的是幾點幾分？</div>
        
        <div class="options-container" id="options"></div>
        <div class="feedback" id="feedbackText"></div>
    </div>

    <div class="win-overlay" id="winOverlay">
        <div class="win-box">
            <h2 style="font-size: 30px; color: #4CAF50; margin: 0 0 10px 0;">🟢 恭喜過關！</h2>
            <p style="font-size: 22px; color: #333; margin-bottom: 25px;">時間觀念太棒了！獲得大紅花印章 💮</p>

            <div style="display: flex; gap: 15px; justify-content: center; width: 100%;">
                <button class="btn" style="background-color: #4CAF50; flex: 1;" onclick="resetGame()">🟢 再挑戰一次</button>
                <a href="index.html" class="btn" style="background-color: #F44336; flex: 1; text-decoration: none; display: inline-block; line-height: 26px; text-align: center;">🔴 回大廳</a>
            </div>
        </div>
    </div>

    <script>
        // 🎵 網頁立體音效產生器 (標準媒體通道，服從靜音模式)
        const AudioEffects = {
            ctx: null,
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
            },
            playCorrect() {
                this.init();
                if (this.ctx.state === 'suspended') this.ctx.resume();

                let osc1 = this.ctx.createOscillator();
                let gain1 = this.ctx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
                gain1.gain.setValueAtTime(0.2, this.ctx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
                osc1.connect(gain1);
                gain1.connect(this.ctx.destination);
                osc1.start();
                osc1.stop(this.ctx.currentTime + 0.1);

                setTimeout(() => {
                    let osc2 = this.ctx.createOscillator();
                    let gain2 = this.ctx.createGain();
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(659.25, this.ctx.currentTime); // E5
                    gain2.gain.setValueAtTime(0.2, this.ctx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.25);
                    osc2.connect(gain2);
                    gain2.connect(this.ctx.destination);
                    osc2.start();
                    osc2.stop(this.ctx.currentTime + 0.25);
                }, 80);
            }
        };

        let currentQuestion = 1;
        const totalQuestions = 3;
        let targetHour = 12;
        let targetMinute = 0;
        let canClick = true;
        let currentLevel = 'normal';

        function changeDifficulty(level) {
            document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${level}`).classList.add('active');
            currentLevel = level;
            resetGame();
        }

        // 格式化時間文字 (例如 05:05)
        function formatTime(h, m) {
            let hourStr = h.toString();
            let minStr = m < 10 ? '0' + m : m.toString();
            return `${hourStr} 點 ${minStr} 分`;
        }

        function generateQuestion() {
            canClick = true;
            document.getElementById('feedbackText').textContent = "";
            document.getElementById('progress').textContent = `第 ${currentQuestion} / ${totalQuestions} 題`;

            // 隨機產生目標小時 (1 ~ 12)
            targetHour = Math.floor(Math.random() * 12) + 1;
            
            // 根據難易度產生目標分鐘
            if (currentLevel === 'easy') {
                // 簡單：0分 或 30分
                targetMinute = Math.random() < 0.5 ? 0 : 30;
            } else if (currentLevel === 'normal') {
                // 普通：5分鐘為一單位 (0, 5, 10 ... 55)
                targetMinute = Math.floor(Math.random() * 12) * 5;
            } else {
                // 困難：隨機 0 ~ 59 分
                targetMinute = Math.floor(Math.random() * 60);
            }

            // 🔮 計算指針旋轉角度
            // 分針：每分鐘旋轉 6 度
            let minuteAngle = targetMinute * 6;
            // 時針：每小時旋轉 30 度，加上分針帶動的微幅位移 (每分鐘 0.5 度)
            let hourAngle = (targetHour % 12) * 30 + (targetMinute * 0.5);

            // 讓網頁上的指針轉動
            document.getElementById('minuteHand').style.transform = `translateX(-50%) rotate(${minuteAngle}deg)`;
            document.getElementById('hourHand').style.transform = `translateX(-50%) rotate(${hourAngle}deg)`;

            // 產生標準正確答案
            let correctText = formatTime(targetHour, targetMinute);

            // 產生干擾答案
            let wrongText1 = "";
            let wrongText2 = "";

            if (currentLevel === 'easy') {
                // 簡單模式：錯在小時，或剛好差半小時
                wrongText1 = formatTime(targetHour === 12 ? 1 : targetHour + 1, targetMinute);
                wrongText2 = formatTime(targetHour, targetMinute === 0 ? 30 : 0);
            } else {
                // 普通與困難：干擾分針加減 10 或 15 分鐘
                let wm1 = (targetMinute + 15) % 60;
                let wm2 = targetMinute - 10 < 0 ? targetMinute + 20 : targetMinute - 10;
                wrongText1 = formatTime(targetHour, wm1);
                wrongText2 = formatTime(targetHour === 1 ? 12 : targetHour - 1, wm2);
            }

            // 確保三個選項不重複
            if(wrongText1 === correctText) wrongText1 = formatTime(targetHour + 2, targetMinute);
            if(wrongText2 === correctText || wrongText2 === wrongText1) wrongText2 = formatTime(targetHour, (targetMinute + 35) % 60);

            // 打亂選項順序
            let options = [
                { text: correctText, isCorrect: true },
                { text: wrongText1, isCorrect: false },
                { text: wrongText2, isCorrect: false }
            ];
            options.sort(() => Math.random() - 0.5);

            // 渲染按鈕
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.classList.add('option-btn');
                btn.textContent = opt.text;
                btn.onclick = () => checkAnswer(opt.isCorrect, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(isCorrect, buttonElement) {
            if (!canClick) return;
            canClick = false;

            const feedback = document.getElementById('feedbackText');
            if (isCorrect) {
                feedback.style.color = "#228B22";
                feedback.textContent = "⭕ 答對了！時間看得真準！";
                buttonElement.style.backgroundColor = "#C8E6C9";
                
                // 📳 觸覺優化：答對時，連續雙重震動
                if (navigator.vibrate) {
                    navigator.vibrate([100, 50, 100]);
                }
                
                // 🎵 播放純媒體音效
                AudioEffects.playCorrect();

                setTimeout(() => {
                    if (currentQuestion < totalQuestions) {
                        currentQuestion++;
                        generateQuestion();
                    } else {
                        document.getElementById('winOverlay').style.display = 'flex';
                    }
                }, 1500);
            } else {
                feedback.style.color = "#D32F2F";
                feedback.textContent = "❌ 看錯囉，再仔細瞄一下指針！";
                buttonElement.style.backgroundColor = "#FFCDD2";
                
                setTimeout(() => {
                    buttonElement.style.backgroundColor = "#FFF";
                    feedback.textContent = "";
                    canClick = true;
                }, 1200);
            }
        }

        function resetGame() {
            document.getElementById('winOverlay').style.display = 'none';
            currentQuestion = 1;
            generateQuestion();
        }

        // 啟動關卡
        generateQuestion();

        // ==========================================
        // 🕒 遊戲中同步累積時間功能
        // ==========================================
        setInterval(() => {
            let currentSeconds = parseInt(localStorage.getItem('game_total_seconds') || '0', 10);
            currentSeconds++;
            localStorage.setItem('game_total_seconds', currentSeconds.toString());
        }, 1000);
    </script>
</body>
</html>
