<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大腦動一動 - 記憶拼圖大賽</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #F5F5DC; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; user-select: none; -webkit-user-select: none; }
        .top-bar { display: flex; justify-content: space-between; width: 100%; max-width: 420px; align-items: center; margin-bottom: 10px; }
        .back-btn { font-size: 18px; font-weight: bold; padding: 10px 18px; background-color: #777; color: white; border: none; border-radius: 12px; text-decoration: none; box-shadow: 0 4px rgba(0,0,0,0.15); }
        h1 { color: #333; font-size: 26px; margin: 0; text-shadow: 1px 1px #FFF; }
        
        .game-card { background-color: white; width: 100%; max-width: 420px; border: 4px solid #E11D48; border-radius: 20px; padding: 15px; box-sizing: border-box; text-align: center; box-shadow: 0 6px 10px rgba(0,0,0,0.1); }
        .hint-text { font-size: 20px; font-weight: bold; color: #555; margin-bottom: 12px; }
        
        /* 拼圖遊戲盤區 */
        .puzzle-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; background-color: #DDD; border: 4px solid #333; border-radius: 12px; padding: 4px; margin: 0 auto; width: 320px; height: 320px; box-sizing: border-box; }
        .puzzle-piece { width: 100%; height: 100%; border-radius: 6px; cursor: pointer; box-sizing: border-box; background-color: #FFF; transition: transform 0.1s, border-color: 0.1s; }
        .puzzle-piece.selected { border: 4px solid #FF5722; transform: scale(0.96); box-shadow: 0 0 12px #FF5722; }

        /* 控制按鈕 */
        .control-box { margin-top: 15px; }
        .preview-btn { font-size: 18px; font-weight: bold; padding: 10px 20px; background-color: #FFA000; color: white; border: none; border-radius: 10px; cursor: pointer; box-shadow: 0 4px #FF6F00; }
        .preview-btn:active { transform: translateY(2px); box-shadow: none; }
        
        /* 完整原圖預覽彈窗 */
        .preview-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 9; }
        .preview-box { background-color: white; padding: 15px; border-radius: 15px; text-align: center; }
        .preview-img { width: 260px; height: 260px; border-radius: 10px; border: 3px solid #333; }

        /* 破關畫面 */
        .win-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 10; }
        .win-box { background-color: white; padding: 30px 20px; border-radius: 20px; text-align: center; max-width: 85%; width: 360px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .btn { font-size: 22px; font-weight: bold; padding: 15px 0; color: white; border: none; border-radius: 12px; cursor: pointer; text-align: center; box-shadow: 0 4px rgba(0,0,0,0.2); box-sizing: border-box; width: 100%; }
        .btn:active { transform: translateY(2px); box-shadow: none; }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="back-btn">⬅️ 回大廳</a>
        <h1>🖼️ 大腦記憶拼圖</h1>
        <div style="width:40px;"></div>
    </div>

    <div class="game-card">
        <div class="hint-text" id="hintText">💡 點選兩個方塊，可以交換位置喔！</div>
        
        <div class="puzzle-container" id="puzzleContainer"></div>
        
        <div class="control-box">
            <button class="preview-btn" onclick="togglePreview(true)">🔍 看一下完整原圖</button>
        </div>
    </div>

    <div class="preview-modal" id="previewModal" onclick="togglePreview(false)">
        <div class="preview-box" onclick="event.stopPropagation()">
            <h3 style="margin-top:0; color:#333;">完整原圖</h3>
            <img class="preview-img" id="modalImg" src="" alt="原圖">
            <button class="btn" style="background-color:#777; margin-top:15px; font-size:18px; padding:10px 0;" onclick="togglePreview(false)">關閉預覽</button>
        </div>
    </div>

    <div class="win-overlay" id="winOverlay">
        <div class="win-box">
            <h2 style="font-size: 34px; color: #E11D48; margin: 0 0 10px 0;">🎉 拼圖大師！</h2>
            <p style="font-size: 22px; color: #333; margin-bottom: 25px; line-height: 1.5;">圖形辨識絲毫不差！<br>成功活化後腦視覺皮質區！</p>
            
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button class="btn" style="background-color: #4CAF50; flex: 1;" onclick="nextLevel()">🟢 玩下一關</button>
                <a href="index.html" class="btn" style="background-color: #F44336; text-decoration: none; flex: 1; display: inline-block; line-height: 26px;">🔴 回大廳</a>
            </div>
        </div>
    </div>

    <script>
        // 🎨 內建適合長輩觀賞的高飽和度、溫馨風格圖片庫 (使用 Unsplash 離線防卡高頻寬網址)
        const PUZZLE_IMAGES = [
            "https://images.unsplash.com/photo-1513836279014-a89f7a76ae86?w=400&auto=format&fit=crop&q=80", // 🌲 綠意森林與陽光
            "https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=400&auto=format&fit=crop&q=80", // ⛰️ 壯麗山水日出
            "https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=400&auto=format&fit=crop&q=80", // 🌉 古樸森林木橋
            "https://images.unsplash.com/photo-1472214222541-d510753a4707?w=400&auto=format&fit=crop&q=80"  // 🌾 溫馨向日葵田野
        ];

        let currentImgIndex = 0;
        let piecesOrder = []; // 目前圖塊的位置排序 [0, 1, 2... 8]
        let selectedIndex = null; // 當前長輩點選的方塊索引
        const size = 3; // 3x3 拼圖

        const img = new Image();
        img.crossOrigin = "anonymous"; // 防止跨域畫布出錯

        // 初始化關卡
        function initPuzzle() {
            document.getElementById('winOverlay').style.display = 'none';
            selectedIndex = null;
            
            // 隨機選一張圖，並同步更新看原圖的彈窗
            img.src = PUZZLE_IMAGES[currentImgIndex];
            document.getElementById('modalImg').src = PUZZLE_IMAGES[currentImgIndex];

            img.onload = () => {
                // 產生 0~8 的正常順序，然後隨機打亂
                piecesOrder = [...Array(size * size).keys()];
                do {
                    piecesOrder.sort(() => Math.random() - 0.5);
                } while (checkWin()); // 確保打亂後不是剛好完成的狀態
                
                renderPuzzle();
            };
        }

        // 把圖片切格並畫到 Canvas 網格按鈕中
        function renderPuzzle() {
            const container = document.getElementById('puzzleContainer');
            container.innerHTML = '';

            const pieceWidth = 300 / size; // 每格 100px
            const pieceHeight = 300 / size;

            for (let i = 0; i < size * size; i++) {
                // 找到這個格子目前應該顯示哪一個碎片的影像
                let currentPieceId = piecesOrder[i];

                // 計算該碎片在原圖中的正確 X, Y 座標
                let origX = (currentPieceId % size) * (img.width / size);
                let origY = Math.floor(currentPieceId / size) * (img.height / size);

                // 創建一個獨立的小 Canvas 畫布當作一塊拼圖碎片
                const canvas = document.createElement('canvas');
                canvas.classList.add('puzzle-piece');
                canvas.width = pieceWidth;
                canvas.height = pieceHeight;
                canvas.dataset.index = i; // 標記目前在九宮格的哪個位置

                const ctx = canvas.getContext('2d');
                // 將原圖的指定區塊裁切、縮放畫進小畫布中
                ctx.drawImage(img, origX, origY, img.width / size, img.height / size, 0, 0, pieceWidth, pieceHeight);

                // 點擊事件：處理互換
                canvas.onclick = () => onPieceClick(i);

                container.appendChild(canvas);
            }
        }

        // 處理長輩點擊拼圖碎片
        function onPieceClick(index) {
            const pieces = document.querySelectorAll('.puzzle-piece');

            if (selectedIndex === null) {
                // 第一下點選：高亮選中
                selectedIndex = index;
                pieces[index].classList.add('selected');
            } else {
                // 第二下點選：如果點同一隻就取消選取
                if (selectedIndex === index) {
                    pieces[index].classList.remove('selected');
                    selectedIndex = null;
                    return;
                }

                // 交換兩者的 ID 排序
                let temp = piecesOrder[selectedIndex];
                piecesOrder[selectedIndex] = piecesOrder[index];
                piecesOrder[index] = temp;

                // 清除選取狀態並重新渲染畫面
                pieces[selectedIndex].classList.remove('selected');
                selectedIndex = null;
                renderPuzzle();

                // 檢查是否成功拼完
                if (checkWin()) {
                    setTimeout(() => {
                        playCorrectSound();
                        document.getElementById('winOverlay').style.display = 'flex';
                    }, 300);
                }
            }
        }

        // 檢查是不是 [0, 1, 2, 3, 4, 5, 6, 7, 8] 的完美順序
        function checkWin() {
            return piecesOrder.every((val, index) => val === index);
        }

        // 下一關
        function nextLevel() {
            currentImgIndex = (currentImgIndex + 1) % PUZZLE_IMAGES.length;
            initPuzzle();
        }

        // 看原圖彈窗切換
        function togglePreview(show) {
            document.getElementById('previewModal').style.display = show ? 'flex' : 'none';
        }

        // 🔔 答對叮咚音效
        function playCorrectSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                let osc1 = ctx.createOscillator();
                let gain1 = ctx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(523.25, ctx.currentTime);
                gain1.gain.setValueAtTime(0.2, ctx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                osc1.connect(gain1);
                gain1.connect(ctx.destination);
                osc1.start(); osc1.stop(ctx.currentTime + 0.1);

                setTimeout(() => {
                    let osc2 = ctx.createOscillator();
                    let gain2 = ctx.createGain();
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(659.25, ctx.currentTime);
                    gain2.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
                    osc2.connect(gain2); gain2.connect(ctx.destination);
                    osc2.start(); osc2.stop(ctx.currentTime + 0.25);
                }, 80);
            } catch(e) {}
        }

        // 啟動拼圖
        initPuzzle();

        // 🕒 大廳時間同步累積計時
        setInterval(() => {
            let currentSeconds = parseInt(localStorage.getItem('game_total_seconds') || '0', 10);
            currentSeconds++;
            localStorage.setItem('game_total_seconds', currentSeconds.toString());
        }, 1000);
    </script>
</body>
</html>
