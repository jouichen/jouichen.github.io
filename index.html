<!DOCTYPE html>
<html lang="zh-TW">
<head>
<link rel="manifest" href="/manifest_v3.json?v=3">
<link rel="apple-touch-icon" href="/brain_icon_v3.png?v=3">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>銀髮族大腦活化中心</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #F5F5DC;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 95vh;
            user-select: none;
            -webkit-user-select: none;
        }
        h1 {
            font-size: 32px;
            color: #333;
            margin: 10px 0 5px 0;
            text-align: center;
            text-shadow: 1px 1px 0px #FFF;
        }
        
        /* -------------------------------------
           ✨ 全新設計：今日健康集點卡區 ✨
        ------------------------------------- */
        .status-card {
            background-color: #FFF;
            border: 4px solid #8B4513; /* 古樸的木質調邊框 */
            border-radius: 20px;
            padding: 15px;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 6px 10px rgba(0,0,0,0.1);
        }
        .status-title {
            font-size: 22px;
            font-weight: bold;
            color: #8B4513;
            margin-bottom: 8px;
        }
        .timer-display {
            font-size: 30px;
            font-weight: bold;
            color: #E65100; /* 亮眼橘色 */
            margin: 5px 0;
        }
        
        /* 蓋印章集點卡樣式 */
        .stamp-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0 5px 0;
        }
        .stamp-slot {
            width: 75px;
            height: 75px;
            border: 3px dashed #999;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #777;
            font-weight: bold;
            position: relative;
            background-color: #FAFAFA;
        }
        /* 當累積滿10、20分鐘，觸發蓋章 */
        .stamp-slot.stamped {
            border: 4px solid #4CAF50;
            color: #4CAF50;
            background-color: #E8F5E9;
        }
        .stamp-slot.stamped::after {
            content: "✔"; /* 綠色大勾勾印章 */
            font-size: 38px;
            position: absolute;
            color: #4CAF50;
            font-weight: bold;
        }

        .target-hint {
            font-size: 18px;
            color: #444;
            margin-top: 8px;
            font-weight: bold;
        }

        /* -------------------------------------
           🎮 友善銀髮族遊戲選單區 (高對比、暖色系)
        ------------------------------------- */
       /* 🎮 頂層容器：改為流暢的雙欄網格 */
        .menu-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 自動分成左右兩欄 */
            gap: 12px;                             /* 按鈕之間的和諧間距 */
            width: 100%;
            max-width: 450px;
            padding: 5px;
            box-sizing: border-box;
        }
        
        /* 🎯 全新升級：雙欄直覺卡片按鈕 */
        .lobby-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 18px 10px;
            color: white;
            font-size: 20px;          /* 主標題字體依舊大又清晰 */
            font-weight: bold;
            text-decoration: none;
            border-radius: 16px;      /* 圓潤邊角更具親和力 */
            box-shadow: 0 6px rgba(0,0,0,0.15);
            transition: transform 0.1s;
            min-height: 110px;        /* 確保手指非常好按 */
            box-sizing: border-box;
        }
        
        .lobby-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px rgba(0,0,0,0.15);
        }

        /* 💡 備註小字：收納在按鈕下方，不干擾視線 */
        .btn-hint {
            font-size: 13px;
            font-weight: normal;
            opacity: 0.9;
            margin-top: 6px;
            line-height: 1.2;
        }

        /* 🎨 按鈕色彩專屬區（維持高對比） */
        .btn-game1 { background-color: #0066CC; } 
        .btn-game2 { background-color: #C2185B; } 
        .btn-game3 { background-color: #E65100; } 
        .btn-game4 { background-color: #00796B; } 
        .btn-game5 { background-color: #7B1FA2; } 
        .btn-game6 { background-color: #D32F2F; } 
        .btn-game7 { background-color: #E11D48; } 
        .btn-game8 { background-color: #115E59; border: 2px solid #F59E0B; }
        
        /* 重置按鈕 */
        .reset-btn {
            margin-top: 25px;
            font-size: 16px;
            font-weight: bold;
            color: #666;
            background: none;
            border: none;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>🧠 大腦動一動中心</h1>
    
    <div class="status-card">
        <div class="status-title">📅 今日大腦運動進度</div>
        <div class="timer-display" id="totalTimeDisplay">今日已玩：0 分 0 秒</div>
        
        <div class="stamp-grid">
            <div class="stamp-slot" id="stamp-10">10分鐘</div>
            <div class="stamp-slot" id="stamp-20">20分鐘</div>
        </div>
        
        <div class="target-hint" id="targetHint">再玩 20 分鐘就能成功蓋章喔！</div>
    </div>

   <div class="menu-container">
        <a href="game_memory.html" onclick="clearInterval(lobbyTimer);" class="lobby-btn btn-game1">
            <span>🧩 圖標對對碰</span>
            <span class="btn-hint">訓練短期記憶</span>
        </a>
        
        <a href="game_math.html" onclick="clearInterval(lobbyTimer);" class="lobby-btn btn-game2">
            <span>🛒 買菜算錢</span>
            <span class="btn-hint">生活邏輯計算</span>
        </a>
        
        <a href="game_clock.html" onclick="clearInterval(lobbyTimer);" class="lobby-btn btn-game3">
            <span>🕒 看看幾點鐘</span>
            <span class="btn-hint">鍛鍊空間時間感</span>
        </a>

        <a href="game_reaction.html" onclick="clearInterval(lobbyTimer);" class="lobby-btn btn-game4">
            <span>🦟 打蚊子大考驗</span>
            <span class="btn-hint">手眼專注反應</span>
        </a>
        
        <a href="game_finger.html" onclick="clearInterval(lobbyTimer);" class="lobby-btn btn-game5">
            <span>🖐️ 手指比數操</span>
            <span class="btn-hint">手腦口全面刺激</span>
        </a>
        
        <a href="game_language.html" onclick="clearInterval(lobbyTimer);" class="lobby-btn btn-game6">
            <span>🗣️ 生活台日語</span>
            <span class="btn-hint">活化語言俚語區</span>
        </a>

        <a href="game_puzzle.html" onclick="clearInterval(lobbyTimer);" class="lobby-btn btn-game7">
            <span>🖼️ 記憶大拼圖</span>
            <span class="btn-hint">圖形空間辨識</span>
        </a>

        <a href="game_mahjong.html" onclick="clearInterval(lobbyTimer);" class="lobby-btn btn-game8">
            <span>🀄 雀聖聽牌</span>
            <span class="btn-hint">自摸神算思維</span>
        </a>
    </div>
    
            <button class="reset-btn" onclick="clearTodayProgress()">重新開始新的一天</button>

    <script>
        const todayStr = new Date().toLocaleDateString();
        
        if (localStorage.getItem('game_date') !== todayStr) {
            localStorage.setItem('game_date', todayStr);
            localStorage.setItem('game_total_seconds', '0');
        }

        let totalSeconds = parseInt(localStorage.getItem('game_total_seconds') || '0', 10);
        let lobbyTimer;

        function updateUI() {
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            document.getElementById('totalTimeDisplay').textContent = `今日已玩：${minutes} 分 ${seconds} 秒`;

            const stamp10 = document.getElementById('stamp-10');
            const stamp20 = document.getElementById('stamp-20');
            const hint = document.getElementById('targetHint');

            if (totalSeconds >= 600) {
                stamp10.classList.add('stamped');
                stamp10.textContent = "🌸"; 
                stamp10.style.fontSize = "42px";
            } else {
                stamp10.classList.remove('stamped');
                stamp10.textContent = "10分鐘";
                stamp10.style.fontSize = "16px";
            }

            if (totalSeconds >= 1200) {
                stamp20.classList.add('stamped');
                stamp20.textContent = "💮"; 
                stamp20.style.fontSize = "46px"; 
                hint.innerHTML = "<span style='color:#D32F2F; font-size:22px; font-weight:bold;'>🎉 恭喜！今日大腦運動大成功！</span>";
            } else {
                stamp20.classList.remove('stamped');
                stamp20.textContent = "20分鐘";
                stamp20.style.fontSize = "16px";
                const remainingMin = Math.ceil((1200 - totalSeconds) / 60);
                hint.textContent = `再激勵大腦 ${remainingMin} 分鐘就能成功達標！`;
            }
        }

        function startLobbyTimer() {
            lobbyTimer = setInterval(() => {
                totalSeconds++;
                localStorage.setItem('game_total_seconds', totalSeconds.toString());
                updateUI();
            }, 1000);
        }

        function enterGame(pageUrl) {
            clearInterval(lobbyTimer);
            window.location.href = pageUrl;
        }

        function clearTodayProgress() {
            if (confirm("確定要清除今天的點數與時間，重新計算嗎？")) {
                totalSeconds = 0;
                localStorage.setItem('game_total_seconds', '0');
                updateUI();
            }
        }

        updateUI();
        startLobbyTimer();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('離線功能準備就緒！', reg))
                    .catch(err => console.log('離線功能啟動失敗', err));
            });
        }
    </script>
</body>
</html>
