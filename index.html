<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>銀髮族大腦活化中心</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #F5F5DC;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
        }
        h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        p {
            font-size: 20px;
            color: #666;
            margin-bottom: 30px;
            text-align: center;
        }
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }
        /* 超大號選單按鈕 */
        .lobby-btn {
            font-size: 24px;
            font-weight: bold;
            padding: 25px 20px;
            border: 4px solid #333;
            border-radius: 20px;
            cursor: pointer;
            color: white;
            text-decoration: none;
            text-align: center;
            box-shadow: 0 8px 10px rgba(0,0,0,0.15);
            transition: transform 0.1s;
        }
        .lobby-btn:active {
            transform: scale(0.95);
        }
        .btn-game1 { background-color: #4682B4; } /* 鋼鐵藍 */
        .btn-game2 { background-color: #E91E63; } /* 桃紅色 */
    </style>
</head>
<body>

    <h1>🧠 大腦動一動中心</h1>
    <p>每天玩一玩，健康有活力！請選擇遊戲：</p>

    <div class="menu-container">
        <a href="game_memory.html" class="lobby-btn btn-game1">🧩 遊戲一：圖標對對碰<br><span style="font-size:16px; font-weight:normal;">(訓練長期與短期記憶)</span></a>
        <a href="game_math.html" class="lobby-btn btn-game2">🛒 遊戲二：買菜算錢大考驗<br><span style="font-size:16px; font-weight:normal;">(訓練邏輯與生活計算力)</span></a>
    </div>

</body>
</html>
