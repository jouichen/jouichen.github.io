<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大腦動一動 - 記憶對對碰</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", "Apple LiGothic Medium", sans-serif;
            background-color: #F5F5DC;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
        }

        h1 {
            color: #333;
            font-size: 26px;
            margin: 10px 0 5px 0;
            text-align: center;
        }

        /* 難易度選擇區 */
        .difficulty-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 480px;
        }

        .diff-btn {
            flex: 1;
            font-size: 18px;
            font-weight: bold;
            padding: 12px 0;
            border: 3px solid #333;
            border-radius: 10px;
            cursor: pointer;
            background-color: #FFF;
            color: #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .diff-btn.active {
            background-color: #4CAF50;
            color: white;
            border-color: #388E3C;
        }

        .score-board {
            font-size: 18px;
            font-weight: bold;
            color: #555;
            margin-bottom: 15px;
            text-align: center;
        }

        /* 遊戲網格 */
        .game-container {
            display: grid;
            gap: 12px;
            width: 100%;
            max-width: 480px;
            padding: 5px;
            box-sizing: border-box;
        }

        .card {
            aspect-ratio: 1 / 1;
            background-color: #4682B4;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px; /* 特大號 Emoji，看得更清楚 */
            box-shadow: 0 5px 6px rgba(0,0,0,0.15);
            position: relative;
        }

        .card:active {
            transform: scale(0.96);
        }

        /* 蓋牌時的大問號 */
        .card::before {
            content: "？";
            color: white;
            font-size: 36px;
            font-weight: bold;
            position: absolute;
        }

        /* 翻開牌後的樣式 */
        .card.flipped {
            background-color: #FFFFFF;
            border: 3px solid #333;
        }

        .card.flipped::before {
            display: none;
        }

        .card.matched {
            background-color: #E0E0E0;
            border: 3px solid #999;
            box-shadow: none;
            cursor: default;
            color: #999; /* 讓答對的 Emoji 變淡，突出還沒答對的 */
        }
        
        .card.matched::before {
            display: none;
        }

        /* 通關彈出視窗 */
        .win-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .win-box {
            background-color: white;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            max-width: 80%;
        }

        .win-box h2 {
            font-size: 30px;
            color: #228B22;
            margin-top: 0;
        }

        .btn {
            font-size: 22px;
            padding: 12px 35px;
            background-color: #FF5722;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .btn:active {
            background-color: #E64A19;
        }
    </style>
</head>
<body>

    <h1>大腦動一動 - 記憶對對碰</h1>

    <!-- 難易度選擇 -->
    <div class="difficulty-container">
        <button class="diff-btn" id="btn-easy" onclick="changeDifficulty('easy')">簡單 (6張)</button>
        <button class="diff-btn active" id="btn-normal" onclick="changeDifficulty('normal')">普通 (12張)</button>
        <button class="diff-btn" id="btn-hard" onclick="changeDifficulty('hard')">困難 (20張)</button>
    </div>

    <div class="score-board" id="scoreBoard">翻牌次數：0 次 | 已成功：0 / 6</div>

    <div class="game-container" id="gameContainer"></div>

    <div class="win-overlay" id="winOverlay">
        <div class="win-box">
            <h2>👍 太棒了！</h2>
            <p style="font-size: 20px; color: #333;">您成功完成了大腦活化運動！</p>
            <button class="btn" onclick="resetGame()">再玩一次</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 【長者專屬的 10 個 Emoji 圖標】
        // ==========================================
        const ALL_ITEMS = ["🍎", "🍉", "🍌", "☎️", "🫖", "🍚", "🚂", "🚗", "🌻", "⛰️"];

        // 難易度組態設定
        const DIFF_CONFIG = {
            easy:   { pairs: 3, cols: 2 }, // 2欄 x 3列 = 6張牌
            normal: { pairs: 6, cols: 3 }, // 3欄 x 4列 = 12張牌
            hard:   { pairs: 10, cols: 4 } // 4欄 x 5列 = 20張牌
        };

        let currentDifficulty = 'normal';
        let cardsData = [];
        let selectedCards = [];
        let clicks = 0;
        let matches = 0;
        let isWaiting = false;

        const gameContainer = document.getElementById('gameContainer');
        const scoreBoard = document.getElementById('scoreBoard');
        const winOverlay = document.getElementById('winOverlay');

        function changeDifficulty(level) {
            if (isWaiting) return;
            
            document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${level}`).classList.add('active');
            
            currentDifficulty = level;
            initGame();
        }

        function initGame() {
            const config = DIFF_CONFIG[currentDifficulty];
            
            // 動態改變排版欄數
            gameContainer.style.gridTemplateColumns = `repeat(${config.cols}, 1fr)`;

            // 根據難度抓取對應數量的 Emoji
            let activeItems = ALL_ITEMS.slice(0, config.pairs);
            
            // 兩兩一組並打亂順序
            let list = [...activeItems, ...activeItems];
            list.sort(() => Math.random() - 0.5);

            cardsData = list.map((value, index) => ({
                id: index,
                value: value,
                isFlipped: false,
                isMatched: false
            }));

            gameContainer.innerHTML = '';
            cardsData.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('card');
                cardElement.dataset.id = card.id;

                cardElement.addEventListener('click', () => handleCardClick(card.id, cardElement));
                gameContainer.appendChild(cardElement);
            });

            clicks = 0;
            matches = 0;
            updateScore();
        }

        function handleCardClick(id, element) {
            if (isWaiting || cardsData[id].isFlipped || cardsData[id].isMatched) return;

            cardsData[id].isFlipped = true;
            element.classList.add('flipped');
            element.textContent = cardsData[id].value; // 顯示 Emoji
            selectedCards.push({ id, element });

            if (selectedCards.length === 2) {
                clicks++;
                updateScore();
                checkMatch();
            }
        }

        function checkMatch() {
            const [card1, card2] = selectedCards;
            const config = DIFF_CONFIG[currentDifficulty];

            if (cardsData[card1.id].value === cardsData[card2.id].value) {
                cardsData[card1.id].isMatched = true;
                cardsData[card2.id].isMatched = true;
                card1.element.classList.add('matched');
                card2.element.classList.add('matched');
                selectedCards = [];
                matches++;
                updateScore();

                if (matches === config.pairs) {
                    setTimeout(() => {
                        winOverlay.style.display = 'flex';
                    }, 500);
                }
            } else {
                isWaiting = true;
                setTimeout(() => {
                    cardsData[card1.id].isFlipped = false;
                    cardsData[card2.id].isFlipped = false;
                    card1.element.classList.remove('flipped');
                    card2.element.classList.remove('flipped');
                    card1.element.textContent = ''; // 清空內容顯示問號
                    card2.element.textContent = '';
                    selectedCards = [];
                    isWaiting = false;
                }, 1200);
            }
        }

        function updateScore() {
            const config = DIFF_CONFIG[currentDifficulty];
            scoreBoard.textContent = `翻牌次數：${clicks} 次 | 已成功：${matches} / ${config.pairs}`;
        }

        function resetGame() {
            winOverlay.style.display = 'none';
            initGame();
        }

        initGame();
    </script>
</body>
</html>
