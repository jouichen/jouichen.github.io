<!DOCTYPE html>
<html lang="zh-TW">
<head>
<link rel="manifest" href="/manifest_v3.json?v=3">
<link rel="apple-touch-icon" href="/brain_icon_v3.png?v=3">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>銀髮族大腦活化中心</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #F5F5DC;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 95vh;
            user-select: none;
            -webkit-user-select: none;
        }
        h1 {
            font-size: 32px;
            color: #333;
            margin: 10px 0 5px 0;
            text-align: center;
            text-shadow: 1px 1px 0px #FFF;
        }
        
        /* -------------------------------------
           ✨ 全新設計：今日健康集點卡區 ✨
        ------------------------------------- */
        .status-card {
            background-color: #FFF;
            border: 4px solid #8B4513; /* 古樸的木質調邊框 */
            border-radius: 20px;
            padding: 15px;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 6px 10px rgba(0,0,0,0.1);
        }
        .status-title {
            font-size: 22px;
            font-weight: bold;
            color: #8B4513;
            margin-bottom: 8px;
        }
        .timer-display {
            font-size: 30px;
            font-weight: bold;
            color: #E65100; /* 亮眼橘色 */
            margin: 5px 0;
        }
        
        /* 蓋印章集點卡樣式 */
        .stamp-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0 5px 0;
        }
        .stamp-slot {
            width: 75px;
            height: 75px;
            border: 3px dashed #999;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #777;
            font-weight: bold;
            position: relative;
            background-color: #FAFAFA;
        }
        /* 當累積滿10、20分鐘，觸發蓋章 */
        .stamp-slot.stamped {
            border: 4px solid #4CAF50;
            color: #4CAF50;
            background-color: #E8F5E9;
        }
        .stamp-slot.stamped::after {
            content: "✔"; /* 綠色大勾勾印章 */
            font-size: 38px;
            position: absolute;
            color: #4CAF50;
            font-weight: bold;
        }

        .target-hint {
            font-size: 18px;
            color: #444;
            margin-top: 8px;
            font-weight: bold;
        }

        /* -------------------------------------
           🎮 友善銀髮族遊戲選單區 (高對比、暖色系)
        ------------------------------------- */
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 400px;
        }
        .lobby-btn {
            font-size: 24px;
            font-weight: bold;
            padding: 22px 15px;
            border: 4px solid #222;
            border-radius: 22px;
            cursor: pointer;
            color: white;
            text-decoration: none;
            text-align: center;
            box-shadow: 0 6px 10px rgba(0,0,0,0.2);
            text-shadow: 1px 2px 3px rgba(0,0,0,0.4); /* 增強文字在按鈕上的清晰度 */
            transition: transform 0.1s;
        }
        .lobby-btn:active {
            transform: scale(0.95);
        }
        
        /* 🎨 精心調配：最適合長輩眼球的高對比按鈕色彩組合 */
        .btn-game1 { background-color: #0066CC; } /* 海軍深藍 - 穩重、字體最鮮明 */
        .btn-game2 { background-color: #C2185B; } /* 胭脂深紅 - 喜慶且辨識度極高 */
        .btn-game3 { background-color: #E65100; } /* 暖陽深橘 - 醒目、極具活力 */
        .btn-game4 { background-color: #00796B; } /* 翡翠深綠 - 護眼、舒適不刺眼 */
        .btn-game5 { background-color: #7B1FA2; } /* 貴族深紫 - 優雅、形狀邊界明確 */
        .btn-game6 { background-color: #D32F2F; } /* 經典正紅 - 強烈視覺導引 */
        
        /* 重置按鈕 */
        .reset-btn {
            margin-top: 25px;
            font-size: 16px;
            font-weight: bold;
            color: #666;
            background: none;
            border: none;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="status-card">

        <div class="timer-display" id="totalTimeDisplay">今日已玩：0 分 0 秒</div>
        
        <div class="stamp-grid">
            <div class="stamp-slot" id="stamp-10">10分鐘</div>
            <div class="stamp-slot" id="stamp-20">20分鐘</div>
        </div>
        
        <div class="target-hint" id="targetHint">再玩 20 分鐘就能成功蓋章喔！</div>
    </div>

    <div class="menu-container">

        <a href="#" onclick="enterGame('game_math.html')" class="lobby-btn btn-game2">🛒 遊戲二：買菜算錢大考驗<br><span style="font-size:16px; font-weight:normal; opacity: 0.95;">(訓練邏輯與生活計算力)</span></a>
        
        <a href="#" onclick="enterGame('game_clock.html')" class="lobby-btn btn-game3">🕒 遊戲三：看看時鐘幾點鐘<br><span style="font-size:16px; font-weight:normal; opacity: 0.95;">(鍛鍊時間觀念與空間視覺)</span></a>

        <a href="#" onclick="enterGame('game_reaction.html')" class="lobby-btn btn-game4">🦟 遊戲四：打蚊子大考驗<br><span style="font-size:16px; font-weight:normal; opacity: 0.95;">(訓練手眼協調與專注反應)</span></a>
        
        <a href="#" onclick="enterGame('game_finger.html')" class="lobby-btn btn-game5">🖐️ 遊戲五：手指比數手指操<br><span style="font-size:16px; font-weight:normal; opacity: 0.95;">(手腦口並用，全面刺激神經)</span></a>
        
        <a href="#" onclick="enterGame('game_language.html')" class="lobby-btn btn-game6">🗣️ 遊戲六：三聲道語言大考驗<br><span style="font-size:16px; font-weight:normal; opacity: 0.95;">(語言靈活切換，活化前額葉)</span></a>
    </div>

    <button class="reset-btn" onclick="clearTodayProgress()">重新開始新的一天</button>
