<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大腦動一動 - 打蚊子大考驗</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #F5F5DC; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; user-select: none; -webkit-user-select: none; }
        .top-bar { display: flex; justify-content: space-between; width: 100%; max-width: 440px; align-items: center; margin-bottom: 15px; }
        .back-btn { font-size: 16px; font-weight: bold; padding: 8px 15px; background-color: #777; color: white; border: none; border-radius: 8px; text-decoration: none; }
        h1 { color: #333; font-size: 24px; margin: 0; }
        .score-board { font-size: 20px; font-weight: bold; color: #555; margin-bottom: 15px; text-align: center; }
        
        /* 3x3 復古紗窗網格 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 440px;
            aspect-ratio: 1 / 1;
            background-color: #D2B48C; /* 褐色木框感 */
            border: 6px solid #8B4513;
            border-radius: 15px;
            padding: 15px;
            box-sizing: border-box;
            box-shadow: 0 8px 12px rgba(0,0,0,0.15);
        }
        .hole {
            background-color: #E6E6FA; /* 淺色紗窗底 */
            border: 2px dashed #999;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }
        
        /* 蚊子本體：超大號 Emoji */
        .mosquito {
            font-size: 65px;
            cursor: pointer;
            animation: buzz 0.2s infinite alternate;
            display: none; /* 預設隱藏 */
        }
        @keyframes buzz {
            0% { transform: translate(0, 0) rotate(-5deg); }
            100% { transform: translate(2px, 2px) rotate(5deg); }
        }

        /* 拍打下去的紅色特效 */
        .hit-effect {
            font-size: 60px;
            position: absolute;
            display: none;
        }

        .win-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 10; }
        .win-box { background-color: white; padding: 25px; border-radius: 20px; text-align: center; max-width: 80%; }
        .btn { font-size: 22px; padding: 12px 35px; background-color: #FF5722; color: white; border: none; border-radius: 10px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="back-btn">⬅️ 回大廳</a>
        <h1>🦟 打蚊子大考驗</h1>
        <div style="width:75px;"></div>
    </div>

    <div class="score-board" id="scoreBoard">目前進度：已消滅 0 / 10 隻蚊子</div>

    <!-- 3x3 遊戲格子 -->
    <div class="grid-container">
        <div class="hole" onclick="hit(0)"><div class="mosquito" id="m0">🦟</div><div class="hit-effect" id="h0">💥</div></div>
        <div class="hole" onclick="hit(1)"><div class="mosquito" id="m1">🦟</div><div class="hit-effect" id="h1">💥</div></div>
        <div class="hole" onclick="hit(2)"><div class="mosquito" id="m2">🦟</div><div class="hit-effect" id="h2">💥</div></div>
        <div class="hole" onclick="hit(3)"><div class="mosquito" id="m3">🦟</div><div class="hit-effect" id="h3">💥</div></div>
        <div class="hole" onclick="hit(4)"><div class="mosquito" id="m4">🦟</div><div class="hit-effect" id="h4">💥</div></div>
        <div class="hole" onclick="hit(5)"><div class="mosquito" id="m5">🦟</div><div class="hit-effect" id="h5">💥</div></div>
        <div class="hole" onclick="hit(6)"><div class="mosquito" id="m6">🦟</div><div class="hit-effect" id="h6">💥</div></div>
        <div class="hole" onclick="hit(7)"><div class="mosquito" id="m7">🦟</div><div class="hit-effect" id="h7">💥</div></div>
        <div class="hole" onclick="hit(8)"><div class="mosquito" id="m8">🦟</div><div class="hit-effect" id="h8">💥</div></div>
    </div>

    <div class="win-overlay" id="winOverlay">
        <div class="win-box">
            <h2 style="font-size: 32px; color: #228B22; margin: 0;">👏 太精準了！</h2>
            <p style="font-size: 22px; color: #333;">身手敏捷，眼睛一亮！<br>反應力100分喔！</p>
            <button class="btn" onclick="resetGame()">再挑戰一次</button>
        </div>
    </div>

    <script>
        let score = 0;
        const targetScore = 10;
        let currentHole = -1;
        let canHit = true;

        // 使用網頁內建語音發出「啪」的音效，不需要載入外部音檔
        function playHitSound() {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance('啪');
                utterance.rate = 2.0; // 讓速度變快
                utterance.pitch = 1.5;
                window.speechSynthesis.speak(utterance);
            }
        }

        function showMosquito() {
            canHit = true;
            // 隱藏所有格子裡的蚊子與特效
            for (let i = 0; i < 9; i++) {
                document.getElementById(`m${i}`).style.display = 'none';
                document.getElementById(`h${i}`).style.display = 'none';
            }

            // 隨機選一個不一樣的格子冒出蚊子
            let nextHole;
            do {
                nextHole = Math.floor(Math.random() * 9);
            } while (nextHole === currentHole);
            
            currentHole = nextHole;
            document.getElementById(`m${currentHole}`).style.display = 'block';
        }

        function hit(holeIndex) {
            if (!canHit || holeIndex !== currentHole) return;
            canHit = false;

            // 成功擊中！
            score++;
            document.getElementById(`m${holeIndex}`).style.display = 'none';
            document.getElementById(`h${holeIndex}`).style.display = 'block'; // 秀出爆炸圖案
            
            playHitSound(); // 播放啪一聲
            document.getElementById('scoreBoard').textContent = `目前進度：已消滅 ${score} / ${targetScore} 隻蚊子`;

            setTimeout(() => {
                if (score < targetScore) {
                    showMosquito();
                } else {
                    document.getElementById('winOverlay').style.display = 'flex';
                }
            }, 600); // 爆炸圖案停留 0.6 秒後換下一隻
        }

        function resetGame() {
            document.getElementById('winOverlay').style.display = 'none';
            score = 0;
            currentHole = -1;
            document.getElementById('scoreBoard').textContent = `目前進度：已消滅 0 / ${targetScore} 隻蚊子`;
            showMosquito();
        }

        // 啟動第一隻蚊子
        showMosquito();

        // ==========================================
        // 🕒 遊戲中同步累積時間功能
        // ==========================================
        setInterval(() => {
            let currentSeconds = parseInt(localStorage.getItem('game_total_seconds') || '0', 10);
            currentSeconds++;
            localStorage.setItem('game_total_seconds', currentSeconds.toString());
        }, 1000);
    </script>
</body>
</html>
