<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大腦動一動 - 三聲道配對大考驗</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #F5F5DC; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; user-select: none; -webkit-user-select: none; }
        .top-bar { display: flex; justify-content: space-between; width: 100%; max-width: 450px; align-items: center; margin-bottom: 10px; }
        .back-btn { font-size: 16px; font-weight: bold; padding: 8px 15px; background-color: #777; color: white; border: none; border-radius: 8px; text-decoration: none; }
        h1 { color: #333; font-size: 24px; margin: 0; }
        
        /* 語言切換按鈕 */
        .lang-container { display: flex; gap: 8px; width: 100%; max-width: 450px; margin-bottom: 15px; }
        .lang-btn { flex: 1; font-size: 18px; font-weight: bold; padding: 12px 0; border: 2px solid #333; border-radius: 8px; cursor: pointer; background-color: #FFF; box-shadow: 0 4px rgba(0,0,0,0.1); }
        .lang-btn.active { background-color: #FF5722; color: white; transform: translateY(2px); box-shadow: none; }

        .game-card { background-color: white; width: 100%; max-width: 450px; border: 4px solid #4CAF50; border-radius: 20px; padding: 20px; box-sizing: border-box; text-align: center; box-shadow: 0 6px 10px rgba(0,0,0,0.1); }
        .status-board { font-size: 18px; font-weight: bold; color: #555; margin-bottom: 10px; }
        
        /* 題目顯示區 */
        .question-box { background-color: #E8F5E9; border: 2px solid #81C784; border-radius: 15px; padding: 15px; margin-bottom: 20px; }
        .target-emoji { font-size: 80px; margin: 10px 0; }
        .sound-btn { font-size: 22px; font-weight: bold; padding: 10px 25px; background-color: #2196F3; color: white; border: none; border-radius: 30px; cursor: pointer; box-shadow: 0 4px #0b7dda; }
        .sound-btn:active { transform: translateY(2px); box-shadow: none; }

        /* 選項區 */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .option-card { font-size: 24px; font-weight: bold; padding: 20px 10px; border: 3px solid #333; border-radius: 12px; background-color: #FFF; cursor: pointer; box-shadow: 0 5px rgba(0,0,0,0.15); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .option-card:active { transform: translateY(3px); box-shadow: none; }
        .pronunciation { font-size: 14px; color: #666; font-weight: normal; margin-top: 5px; }

        .feedback { font-size: 24px; font-weight: bold; margin-top: 15px; height: 35px; }
        
        .win-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 10; }
        .win-box { background-color: white; padding: 25px; border-radius: 20px; text-align: center; max-width: 80%; }
        .btn { font-size: 22px; padding: 12px 35px; background-color: #4CAF50; color: white; border: none; border-radius: 10px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="back-btn">⬅️ 回大廳</a>
        <h1>🗣️ 三聲道大考驗</h1>
        <div style="width:75px;"></div>
    </div>

    <div class="lang-container">
        <button class="lang-btn active" id="btn-tw" onclick="changeLanguage('tw')">閩南語 (台語)</button>
        <button class="lang-btn" id="btn-ch" onclick="changeLanguage('ch')">國語 (中文)</button>
        <button class="lang-btn" id="btn-jp" onclick="changeLanguage('jp')">日本語 (日文)</button>
    </div>

    <div class="game-card">
        <div class="status-board" id="progressText">第 1 / 3 題</div>
        
        <div class="question-box">
            <div style="font-size: 18px; font-weight: bold; color: #2E7D32;">這是什麼水果？聽聽看！</div>
            <div class="target-emoji" id="targetEmoji">🍎</div>
            <button class="sound-btn" onclick="playSound()">🔊 播放讀音</button>
        </div>
        
        <div class="options-grid" id="optionsGrid"></div>
        <div class="feedback" id="feedbackText"></div>
    </div>

    <div class="win-overlay" id="winOverlay">
        <div class="win-box">
            <h2 style="font-size: 32px; color: #FF5722; margin: 0;">🌟 語言大師！</h2>
            <p style="font-size: 22px; color: #333;">多聲道轉換自如！<br>大腦語言區被強力活化囉！</p>
            <button class="btn" onclick="resetGame()">再挑戰一次</button>
        </div>
    </div>

    <script>
        // 核心多語言水果題庫
        const FRUIT_DATABASE = [
            { id: "apple", emoji: "🍎", tw: "蘋果 (phông-kó)", ch: "蘋果", jp: "林檎 (りんご)", tts_tw: "蘋果", tts_ch: "蘋果", tts_jp: "りんご" },
            { id: "banana", emoji: "🍌", tw: "弓蕉 (king-tsio)", ch: "香蕉", jp: "バナナ", tts_tw: "弓蕉", tts_ch: "香蕉", tts_jp: "バナナ" },
            { id: "pineapple", emoji: "🍍", tw: "鳳梨 (hông-lâi)", ch: "鳳梨", jp: "パイナップル", tts_tw: "鳳梨", tts_ch: "鳳梨", tts_jp: "パイナップル" },
            { id: "watermelon", emoji: "🍉", tw: "西瓜 (si-kue)", ch: "西瓜", jp: "スイカ", tts_tw: "西瓜", tts_ch: "西瓜", tts_jp: "すいか" },
            { id: "orange", emoji: "🍊", tw: "柑仔 (kam-á)", ch: "橘子", jp: "みかん", tts_tw: "柑仔", tts_ch: "橘子", tts_jp: "みかん" }
        ];

        let currentQuestion = 1;
        const totalQuestions = 3;
        let currentLang = 'tw'; // tw, ch, jp
        let currentQuizItem = null;
        let canClick = true;

        function changeLanguage(lang) {
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${lang}`).classList.add('active');
            currentLang = lang;
            resetGame();
        }

        function generateQuestion() {
            canClick = true;
            document.getElementById('feedbackText').textContent = "";
            document.getElementById('progressText').textContent = `第 ${currentQuestion} / ${totalQuestions} 題`;

            // 隨機選出一種水果當題目
            const randomIndex = Math.floor(Math.random() * FRUIT_DATABASE.length);
            currentQuizItem = FRUIT_DATABASE[randomIndex];

            document.getElementById('targetEmoji').textContent = currentQuizItem.emoji;

            // 挑選另外兩個錯誤答案
            let pool = FRUIT_DATABASE.filter(item => item.id !== currentQuizItem.id);
            pool.sort(() => Math.random() - 0.5);
            let wrong1 = pool[0];
            let wrong2 = pool[1];

            let options = [currentQuizItem, wrong1, wrong2];
            options.sort(() => Math.random() - 0.5);

            // 渲染選項按鈕
            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = '';

            options.forEach(item => {
                const btn = document.createElement('button');
                btn.classList.add('option-card');
                
                // 根據當前語言顯示文字
                if (currentLang === 'tw') btn.innerHTML = item.tw;
                if (currentLang === 'ch') btn.innerHTML = item.ch;
                if (currentLang === 'jp') btn.innerHTML = item.jp;

                btn.onclick = () => checkAnswer(item, btn);
                grid.appendChild(btn);
            });

            // 自動播放一次聲音
            setTimeout(() => { playSound(); }, 400);
        }

        function playSound() {
            if (!currentQuizItem) return;
            
            // 使用瀏覽器內建 Web Speech API
            const utterance = new SpeechSynthesisUtterance();
            
            if (currentLang === 'tw') {
                utterance.text = currentQuizItem.tts_tw;
                utterance.lang = 'zh-HK'; // 瀏覽器台語通常用 zh-HK 語調借代，或特定裝置支援閩南語
            } else if (currentLang === 'ch') {
                utterance.text = currentQuizItem.tts_ch;
                utterance.lang = 'zh-TW';
            } else if (currentLang === 'jp') {
                utterance.text = currentQuizItem.tts_jp;
                utterance.lang = 'ja-JP';
            }
            
            utterance.rate = 0.8; // 放慢速度方便長輩聽
            window.speechSynthesis.speak(utterance);
        }

        function checkAnswer(selectedItem, buttonElement) {
            if (!canClick) return;
            canClick = false;

            const feedback = document.getElementById('feedbackText');
            if (selectedItem.id === currentQuizItem.id) {
                feedback.style.color = "#228B22";
                feedback.textContent = "⭕ 太棒了！答對了！";
                buttonElement.style.backgroundColor = "#C8E6C9";
                
                setTimeout(() => {
                    if (currentQuestion < totalQuestions) {
                        currentQuestion++;
                        generateQuestion();
                    } else {
                        document.getElementById('winOverlay').style.display = 'flex';
                    }
                }, 1500);
            } else {
                feedback.style.color = "#D32F2F";
                feedback.textContent = "❌ 不對喔，再聽一次聲音試試！";
                buttonElement.style.backgroundColor = "#FFCDD2";
                setTimeout(() => {
                    buttonElement.style.backgroundColor = "#FFF";
                    feedback.textContent = "";
                    canClick = true;
                }, 1200);
            }
        }

        function resetGame() {
            document.getElementById('winOverlay').style.display = 'none';
            currentQuestion = 1;
            generateQuestion();
        }

        // 初始化
        generateQuestion();

        // 🕒 離線時間同步累積
        setInterval(() => {
            let currentSeconds = parseInt(localStorage.getItem('game_total_seconds') || '0', 10);
            currentSeconds++;
            localStorage.setItem('game_total_seconds', currentSeconds.toString());
        }, 1000);
    </script>
</body>
</html>
